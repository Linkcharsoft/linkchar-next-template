version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - corepack enable
        - CI=true pnpm install --frozen-lockfile
        - env | grep -E "^(AUTH_|MAILSLURP_)" >> .env.production
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
